<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>
  <link rel="stylesheet" href="../static/style.css">
</head>

<body>

  <header>
    <h2>MyPortfolio</h2>
    <nav>
      <a href="#">Home</a>
      <a href="#about">About</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Hi, I'm Praveen Mehta</h1>
    <p>Technology Enthusiast | Developer | Innovator</p>
    <button class="btn" onclick="scrollToSection('projects')">View Projects</button>
  </section>

  <section id="about">
    <h2>About Me</h2>
    <p>I am passionate about AI, robotics, and building real-world solutions.</p>
  </section>

  <section id="projects">
    <h2>Projects</h2>
    <div class="projects">
      <div class="card">Project 1</div>
      <div class="card">Project 2</div>
      <div class="card">Project 3</div>
    </div>
  </section>

  <section id="contact">
    <h2>Contact Me</h2>
    <div class="contact">
      <form onsubmit="sendContactData(event)">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Your Email" required>
        <textarea id="message" placeholder="Message" required></textarea>
        <button type="submit" class="btn">Send</button>
      </form>
    </div>
  </section>

  <footer>
    <p>© 2026 Praveen Mehta</p>
  </footer>

  <script src="../static/script.js"></script>
</body>

</html>
