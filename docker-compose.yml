version: "3.9"

services:

  backend:
  
    build: ./backend
    
    container_name: backend_service
    
    ports:
      - "7000:7000"
    
    env_file:
      - ./backend/.env
    
    restart: always



  frontend:
  
    build: ./frontend
    
    container_name: frontend_service
    
    ports:
      - "3000:3000"
    
    env_file:
      - ./frontend/.env
    
    depends_on:
      - backend
    
    restart: always