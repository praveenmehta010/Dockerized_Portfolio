name: run portfolio

on: [push]

jobs:
  protfolio :
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: list Repositors
        run : |
          ls
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> backend/.env
          echo "BACKEND_URL=${{ secrets.BACKEND_URL }}" >> frontend/.env
          ls -a ./backend
          ls -a ./frontend
      

      - name: Build project using compose
        run: docker compose up -d --build

      - name: Test Frontend
        run: curl http://localhost:7000